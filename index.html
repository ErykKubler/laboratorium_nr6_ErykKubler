<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kalkulator Urodzinowy</title>
    <link href="/src/style.css" rel="stylesheet" />
  </head>
  <body class="bg-slate-900 text-slate-100 flex flex-col items-center justify-center min-h-screen p-4">

    <div class="bg-slate-800 p-8 rounded-lg shadow-2xl border border-slate-700 w-full max-w-md">
      
      <h1 class="text-2xl font-bold text-primary mb-6 text-center uppercase tracking-wide">
        Kalkulator Urodzin
      </h1>
      
      <form id="birthday-form" class="flex flex-col gap-4">
        <label for="birth-date" class="font-medium text-slate-300 text-sm">
          Wybierz datę swoich urodzin:
        </label>
        <input 
          type="date" 
          id="birth-date" 
          required 
          class="bg-slate-700 border border-slate-600 p-2 rounded-md text-white focus:outline-none focus:ring-2 focus:ring-blue-300"
        >
        <button 
          type="submit" 
          class="bg-button-submit hover:bg-blue-400 text-slate-900 font-bold p-4 rounded-md transition-colors uppercase tracking-wider"
        >
          Oblicz statystyki
        </button>
      </form>
    </div>

    <dialog id="birthday-dialog" class="bg-dialog-bg text-dialog-text p-6 rounded-lg shadow-2xl relative max-w-sm w-full backdrop:bg-black/60">
      <button id="close-birthday-dialog" class="absolute top-2 right-4 text-slate-700 hover:text-slate-900 font-bold text-2xl">
        &times;
      </button>
      
      <div id="birthday-dialog-content" class="mt-4 space-y-2 text-center font-bold uppercase tracking-wide">
      </div>
    </dialog>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
